<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wavecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14171c;
    --ink-2: #1c2029;
    --panel: #20242e;
    --paper: #ede6d6;
    --paper-dim: #b8b0a0;
    --dial: #e8a33d;
    --dial-dim: #8a6a35;
    --needle: #d4634a;
    --line: #383d4a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  .frame {
    width: 100%;
    max-width: 760px;
  }

  .band {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 30px;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 0.01em;
    color: var(--paper);
  }
  .brand span { color: var(--dial); font-style: italic; font-weight: 400; }

  .lang-toggle {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--paper-dim);
    padding: 7px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .lang-toggle:hover { border-color: var(--dial); color: var(--dial); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 26px;
    margin-bottom: 20px;
    position: relative;
  }

  .panel-label {
    position: absolute;
    top: -9px;
    left: 20px;
    background: var(--ink);
    padding: 0 8px;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--dial-dim);
    text-transform: uppercase;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    background: transparent;
    border: none;
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-size: 17px;
    line-height: 1.65;
    resize: vertical;
    outline: none;
  }
  textarea::placeholder { color: #565b68; font-style: italic; }

  .upload-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .upload-btn {
    background: var(--ink-2);
    border: 1px dashed var(--line);
    color: var(--paper-dim);
    padding: 9px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .upload-btn:hover { border-color: var(--dial); color: var(--dial); }

  #fileStatus {
    font-size: 12px;
    color: var(--paper-dim);
  }
  #fileStatus.error { color: #e8a6a6; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 10px;
    border-top: 1px dashed var(--line);
    padding-top: 10px;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-bottom: 8px;
  }

  select, .slider-row input[type="range"] {
    width: 100%;
  }

  select {
    background: var(--ink-2);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row output {
    font-size: 12px;
    width: 46px;
    text-align: right;
    color: var(--dial);
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 2px;
    background: var(--line);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--dial);
    cursor: pointer;
    border: 2px solid var(--ink);
  }

  .archive-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--paper-dim);
    margin-top: 22px;
  }
  .archive-toggle input { accent-color: var(--dial); }

  .split-options {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 14px;
    margin-left: 26px;
    padding-left: 14px;
    border-left: 2px solid var(--line);
  }
  .split-options.show { display: flex; }

  .radio-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--paper-dim);
    cursor: pointer;
  }
  .radio-row input { accent-color: var(--dial); }

  .action-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 28px;
  }

  button.generate {
    background: var(--dial);
    color: var(--ink);
    border: none;
    padding: 14px 26px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  button.generate:hover { background: #f2b658; }
  button.generate:active { transform: scale(0.97); }
  button.generate:disabled {
    background: var(--dial-dim);
    color: #c9c3b3;
    cursor: not-allowed;
  }
  button.generate.secondary {
    background: transparent;
    border: 1px solid var(--dial);
    color: var(--dial);
  }
  button.generate.secondary:hover { background: rgba(232, 163, 61, 0.12); }
  button.generate.secondary:disabled {
    border-color: var(--dial-dim);
    color: var(--dial-dim);
    background: transparent;
  }

  .status {
    font-size: 12px;
    color: var(--paper-dim);
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 20px;
  }

  /* waveform, the signature element */
  .wave {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
  }
  .wave span {
    display: inline-block;
    width: 3px;
    background: var(--dial);
    border-radius: 1px;
    height: 4px;
    opacity: 0.35;
  }
  .wave.active span {
    animation: bounce 0.9s ease-in-out infinite;
    opacity: 1;
  }
  .wave span:nth-child(1) { animation-delay: 0s; }
  .wave span:nth-child(2) { animation-delay: 0.1s; }
  .wave span:nth-child(3) { animation-delay: 0.2s; }
  .wave span:nth-child(4) { animation-delay: 0.3s; }
  .wave span:nth-child(5) { animation-delay: 0.15s; }
  .wave span:nth-child(6) { animation-delay: 0.25s; }
  .wave span:nth-child(7) { animation-delay: 0.05s; }

  @keyframes bounce {
    0%, 100% { height: 4px; }
    50% { height: 20px; }
  }

  .result {
    margin-top: 18px;
    padding: 16px 20px;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 3px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .result.show { display: flex; }
  .result-info { font-size: 12px; color: var(--paper-dim); line-height: 1.5; }
  .result-info strong { color: var(--paper); }

  a.download-btn {
    background: transparent;
    border: 1px solid var(--dial);
    color: var(--dial);
    padding: 9px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
    white-space: nowrap;
  }
  a.download-btn:hover { background: var(--dial); color: var(--ink); }

  .parts-list {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .part-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 18px;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 12px;
    color: var(--paper-dim);
  }
  .part-row .part-label { color: var(--paper); }
  .part-row .part-actions { display: flex; gap: 10px; }
  .part-row .download-btn { padding: 6px 12px; font-size: 11px; }

  .error-box {
    margin-top: 18px;
    padding: 14px 18px;
    background: #2a1a1a;
    border: 1px solid #6b3535;
    color: #e8a6a6;
    font-size: 12px;
    border-radius: 3px;
    display: none;
  }
  .error-box.show { display: block; }
  .error-box.warning {
    background: #2a2410;
    border: 1px solid #6b5a35;
    color: #e8c98a;
  }

  footer {
    margin-top: 40px;
    font-size: 11px;
    color: #4d525f;
    text-align: center;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="frame">

  <div class="band">
    <div class="brand">wave<span>cast</span></div>
    <button class="lang-toggle" id="langToggle" type="button">EN / PT-BR</button>
  </div>

  <div class="panel">
    <span class="panel-label">Manuscript</span>
    <div class="upload-row">
      <label class="upload-btn" for="fileInput">Upload .txt or .docx</label>
      <input type="file" id="fileInput" accept=".txt,.docx" hidden>
      <span id="fileStatus"></span>
    </div>
    <textarea id="text" placeholder="Paste or type the text you want read aloud, or upload a file above…"></textarea>
    <div class="meta-row">
      <span id="charcount">0 characters</span>
      <span id="chunkinfo"></span>
    </div>
  </div>

  <div class="panel">
    <span class="panel-label">Dial settings</span>
    <div class="controls-grid">
      <div class="field">
        <label for="voice">Voice</label>
        <select id="voice">
          {% for v in voices %}
          <option value="{{ v.id }}">{{ v.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Speed</label>
        <div class="slider-row">
          <input type="range" id="rate" min="-50" max="50" value="0" step="5">
          <output id="rateOut">0%</output>
        </div>
      </div>
      <div class="field">
        <label>Pitch</label>
        <div class="slider-row">
          <input type="range" id="pitch" min="-50" max="50" value="0" step="5">
          <output id="pitchOut">0Hz</output>
        </div>
      </div>
    </div>
    <label class="archive-toggle">
      <input type="checkbox" id="splitToggle">
      <span id="splitToggleLabel">For long text, split into separate parts instead of one merged MP3</span>
    </label>
    <div class="split-options" id="splitOptions">
      <label class="radio-row">
        <input type="radio" name="splitMode" value="parts" checked>
        <span id="splitOptSeparate">Download each part separately</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="splitMode" value="zip">
        <span id="splitOptZip">Download all parts together (.zip)</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="splitMode" value="single">
        <span id="splitOptCombine">Combine parts into a single MP3</span>
      </label>
    </div>
  </div>

  <div class="action-row">
    <button class="generate" id="genBtn">Generate audio</button>
    <button class="generate secondary" id="readBtn">Read aloud</button>
    <div class="status">
      <div class="wave" id="wave">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <span id="statusText"></span>
    </div>
  </div>

  <audio id="player" controls style="display:none; width:100%; margin-top:16px;"></audio>

  <div id="resultsWrap">
    <div class="result" id="result">
      <div class="result-info">
        <strong id="resultName"></strong><br>
        <span id="resultMeta"></span>
      </div>
      <a href="#" class="download-btn" id="downloadLink" download>Download</a>
    </div>
    <div class="parts-list" id="partsList"></div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <footer>
    <span id="footerText">Powered by the open-source <code>edge-tts</code> project, which uses Microsoft's
    free "Read aloud" text-to-speech service.</span>
  </footer>
</div>

<script>
const I18N = {
  en: {
    htmlLang: 'en',
    langToggle: 'EN / PT-BR',
    panelManuscript: 'Manuscript',
    uploadBtn: 'Upload .txt or .docx',
    textPlaceholder: 'Paste or type the text you want read aloud, or upload a file above…',
    panelDial: 'Dial settings',
    voiceLabel: 'Voice',
    speedLabel: 'Speed',
    pitchLabel: 'Pitch',
    splitToggleLabel: 'For long text, split into separate parts instead of one merged MP3',
    splitOptSeparate: 'Download each part separately',
    splitOptZip: 'Download all parts together (.zip)',
    splitOptCombine: 'Combine parts into a single MP3',
    genBtn: 'Generate audio',
    readBtn: 'Read aloud',
    statusSynth: 'Synthesizing…',
    statusReading: 'Preparing audio…',
    statusDone: 'Done.',
    errNoText: 'Paste some text first.',
    errGeneric: 'Something went wrong.',
    readyToPlay: 'Ready to play',
    partsSynthesized: (n) => `${n} parts synthesized`,
    downloadBtn: 'Download',
    playBtn: 'Play',
    partLabel: (i) => `Part ${i}`,
    footerHtml: 'Powered by the open-source <code>edge-tts</code> project, which uses Microsoft\'s free "Read aloud" text-to-speech service.',
    defaultVoice: 'en-US-EmmaNeural',
    charCount: (n) => n.toLocaleString() + ' character' + (n === 1 ? '' : 's'),
    chunkInfo: (n) => `~${n} audio parts`,
    reading: (name) => `Reading ${name}…`,
    loaded: (name) => `Loaded ${name}`,
    couldNotRead: 'Could not read that file.',
    partialFailure: (failedCount, total, numbers) =>
      `Heads up: ${failedCount} of ${total} part(s) failed to synthesize (part${failedCount === 1 ? '' : 's'} ${numbers}) — likely a temporary hiccup reaching the speech service. Everything else below succeeded. Generating again will retry the whole text if you want another attempt at those parts.`,
  },
  pt: {
    htmlLang: 'pt-BR',
    langToggle: 'PT-BR / EN',
    panelManuscript: 'Manuscrito',
    uploadBtn: 'Enviar .txt ou .docx',
    textPlaceholder: 'Cole ou digite o texto que você quer ouvir, ou envie um arquivo acima…',
    panelDial: 'Configurações',
    voiceLabel: 'Voz',
    speedLabel: 'Velocidade',
    pitchLabel: 'Tom',
    splitToggleLabel: 'Para textos longos, dividir em partes separadas em vez de um único MP3',
    splitOptSeparate: 'Baixar cada parte separadamente',
    splitOptZip: 'Baixar todas as partes juntas (.zip)',
    splitOptCombine: 'Combinar as partes em um único MP3',
    genBtn: 'Gerar áudio',
    readBtn: 'Ler em voz alta',
    statusSynth: 'Sintetizando…',
    statusReading: 'Preparando áudio…',
    statusDone: 'Pronto.',
    errNoText: 'Cole algum texto primeiro.',
    errGeneric: 'Algo deu errado.',
    readyToPlay: 'Pronto para tocar',
    partsSynthesized: (n) => `${n} partes sintetizadas`,
    downloadBtn: 'Baixar',
    playBtn: 'Tocar',
    partLabel: (i) => `Parte ${i}`,
    footerHtml: 'Desenvolvido com o projeto open-source <code>edge-tts</code>, que usa o serviço gratuito "Ler em voz alta" da Microsoft.',
    defaultVoice: 'pt-BR-FranciscaNeural',
    charCount: (n) => n.toLocaleString() + (n === 1 ? ' caractere' : ' caracteres'),
    chunkInfo: (n) => `~${n} partes de áudio`,
    reading: (name) => `Lendo ${name}…`,
    loaded: (name) => `Carregado: ${name}`,
    couldNotRead: 'Não foi possível ler esse arquivo.',
    partialFailure: (failedCount, total, numbers) =>
      `Atenção: ${failedCount} de ${total} parte(s) falharam ao sintetizar (parte${failedCount === 1 ? '' : 's'} ${numbers}) — provavelmente uma instabilidade temporária no serviço de voz. O restante abaixo funcionou normalmente. Gerar novamente vai refazer o texto todo, se quiser tentar de novo essas partes.`,
  }
};

let currentLang = 'en';

const textEl = document.getElementById('text');
const charcountEl = document.getElementById('charcount');
const chunkinfoEl = document.getElementById('chunkinfo');
const voiceEl = document.getElementById('voice');
const rateEl = document.getElementById('rate');
const pitchEl = document.getElementById('pitch');
const rateOut = document.getElementById('rateOut');
const pitchOut = document.getElementById('pitchOut');
const genBtn = document.getElementById('genBtn');
const readBtn = document.getElementById('readBtn');
const wave = document.getElementById('wave');
const statusText = document.getElementById('statusText');
const result = document.getElementById('result');
const resultName = document.getElementById('resultName');
const resultMeta = document.getElementById('resultMeta');
const downloadLink = document.getElementById('downloadLink');
const errorBox = document.getElementById('errorBox');
const splitToggle = document.getElementById('splitToggle');
const splitOptions = document.getElementById('splitOptions');
const partsList = document.getElementById('partsList');
const player = document.getElementById('player');
const langToggle = document.getElementById('langToggle');
const fileInput = document.getElementById('fileInput');
const fileStatus = document.getElementById('fileStatus');
const uploadLabel = document.querySelector('label[for="fileInput"]');

const CHUNK_SIZE = 3000;

function updateCharCount() {
  const t = I18N[currentLang];
  const len = textEl.value.length;
  charcountEl.textContent = t.charCount(len);
  const chunks = Math.max(1, Math.ceil(len / CHUNK_SIZE));
  chunkinfoEl.textContent = chunks > 1 ? t.chunkInfo(chunks) : '';
}

function applyLanguage(lang) {
  currentLang = lang;
  const t = I18N[lang];
  document.documentElement.lang = t.htmlLang;
  langToggle.textContent = t.langToggle;
  document.querySelector('.panel-label').textContent = t.panelManuscript;
  document.querySelectorAll('.panel-label')[1].textContent = t.panelDial;
  uploadLabel.textContent = t.uploadBtn;
  textEl.placeholder = t.textPlaceholder;
  document.querySelector('label[for="voice"]').textContent = t.voiceLabel;
  document.getElementById('splitToggleLabel').textContent = t.splitToggleLabel;
  document.getElementById('splitOptSeparate').textContent = t.splitOptSeparate;
  document.getElementById('splitOptZip').textContent = t.splitOptZip;
  document.getElementById('splitOptCombine').textContent = t.splitOptCombine;
  genBtn.textContent = t.genBtn;
  readBtn.textContent = t.readBtn;
  downloadLink.textContent = t.downloadBtn;
  document.getElementById('footerText').innerHTML = t.footerHtml;

  const speedPitchLabels = document.querySelectorAll('.field label');
  // speedPitchLabels[0] is "Voice" (already set above via selector), so grab by structure instead:
  const allFieldLabels = document.querySelectorAll('.controls-grid .field label');
  allFieldLabels[0].textContent = t.voiceLabel;
  allFieldLabels[1].textContent = t.speedLabel;
  allFieldLabels[2].textContent = t.pitchLabel;

  // Set this language's default voice, if the current selection belongs to
  // the *other* language's default (i.e. the user hasn't deliberately picked
  // something else).
  const otherDefault = lang === 'en' ? I18N.pt.defaultVoice : I18N.en.defaultVoice;
  if (voiceEl.value === otherDefault || !voiceEl.value) {
    voiceEl.value = t.defaultVoice;
  }

  updateCharCount();
}

langToggle.addEventListener('click', () => {
  applyLanguage(currentLang === 'en' ? 'pt' : 'en');
});

// Set the initial default voice (Emma) on first load.
voiceEl.value = I18N.en.defaultVoice;
applyLanguage('en');

textEl.addEventListener('input', updateCharCount);

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  const t = I18N[currentLang];

  fileStatus.classList.remove('error');
  fileStatus.textContent = t.reading(file.name);

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/api/extract-text', { method: 'POST', body: formData });
    const data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.error || t.couldNotRead);
    }
    textEl.value = data.text;
    updateCharCount();
    fileStatus.textContent = t.loaded(file.name);
  } catch (err) {
    fileStatus.classList.add('error');
    fileStatus.textContent = err.message;
  } finally {
    fileInput.value = '';
  }
});

rateEl.addEventListener('input', () => {
  const v = parseInt(rateEl.value, 10);
  rateOut.textContent = (v >= 0 ? '+' : '') + v + '%';
});
pitchEl.addEventListener('input', () => {
  const v = parseInt(pitchEl.value, 10);
  pitchOut.textContent = (v >= 0 ? '+' : '') + v + 'Hz';
});

splitToggle.addEventListener('change', () => {
  splitOptions.classList.toggle('show', splitToggle.checked);
});

function clearOutputs() {
  errorBox.classList.remove('show', 'warning');
  result.classList.remove('show');
  partsList.innerHTML = '';
  player.style.display = 'none';
  player.pause();
  player.removeAttribute('src');
}

function currentSplitMode() {
  if (!splitToggle.checked) return 'single';
  const chosen = document.querySelector('input[name="splitMode"]:checked');
  return chosen ? chosen.value : 'parts';
}

async function requestGeneration(mode) {
  const resp = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text: textEl.value.trim(),
      voice: voiceEl.value,
      rate: parseInt(rateEl.value, 10),
      pitch: parseInt(pitchEl.value, 10),
      mode
    })
  });
  const data = await resp.json();
  if (!resp.ok) {
    throw new Error(data.error || I18N[currentLang].errGeneric);
  }
  return data;
}

function renderSingleOrZipResult(data) {
  const t = I18N[currentLang];
  downloadLink.href = data.download_url;
  downloadLink.setAttribute('download', data.filename);
  resultName.textContent = data.filename;
  resultMeta.textContent = data.parts > 1 ? t.partsSynthesized(data.parts) : t.readyToPlay;
  result.classList.add('show');
}

function renderPartsResult(data) {
  const t = I18N[currentLang];
  partsList.innerHTML = '';
  data.parts.forEach((part) => {
    const row = document.createElement('div');
    row.className = 'part-row';

    const label = document.createElement('span');
    label.className = 'part-label';
    label.textContent = t.partLabel(part.index);

    const actions = document.createElement('div');
    actions.className = 'part-actions';

    const playBtn = document.createElement('button');
    playBtn.className = 'download-btn';
    playBtn.textContent = t.playBtn;
    playBtn.type = 'button';
    playBtn.addEventListener('click', () => {
      player.src = part.play_url;
      player.style.display = 'block';
      player.play();
    });

    const dl = document.createElement('a');
    dl.className = 'download-btn';
    dl.href = part.download_url;
    dl.textContent = t.downloadBtn;
    dl.setAttribute('download', part.filename);

    actions.appendChild(playBtn);
    actions.appendChild(dl);
    row.appendChild(label);
    row.appendChild(actions);
    partsList.appendChild(row);
  });
}

function showPartialFailureWarning(data) {
  if (!data.failed || data.failed.length === 0) return;
  const t = I18N[currentLang];
  const failedNumbers = data.failed.map((f) => f.index).join(', ');
  errorBox.textContent = t.partialFailure(data.failed.length, data.total_chunks, failedNumbers);
  errorBox.classList.remove('show', 'error-only');
  errorBox.classList.add('show', 'warning');
}

genBtn.addEventListener('click', async () => {
  const t = I18N[currentLang];
  clearOutputs();

  if (!textEl.value.trim()) {
    errorBox.textContent = t.errNoText;
    errorBox.classList.add('show');
    return;
  }

  genBtn.disabled = true;
  readBtn.disabled = true;
  wave.classList.add('active');
  statusText.textContent = t.statusSynth;

  try {
    const mode = currentSplitMode();
    const data = await requestGeneration(mode);

    if (data.mode === 'parts') {
      renderPartsResult(data);
    } else {
      renderSingleOrZipResult(data);
    }
    showPartialFailureWarning(data);
    statusText.textContent = t.statusDone;
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('show');
    statusText.textContent = '';
  } finally {
    genBtn.disabled = false;
    readBtn.disabled = false;
    wave.classList.remove('active');
  }
});

readBtn.addEventListener('click', async () => {
  const t = I18N[currentLang];
  clearOutputs();

  if (!textEl.value.trim()) {
    errorBox.textContent = t.errNoText;
    errorBox.classList.add('show');
    return;
  }

  genBtn.disabled = true;
  readBtn.disabled = true;
  wave.classList.add('active');
  statusText.textContent = t.statusReading;

  try {
    // Read Aloud always produces one continuous track, regardless of the
    // split-into-parts option (that option only applies to downloads).
    const data = await requestGeneration('single');
    player.src = data.play_url;
    player.style.display = 'block';
    await player.play();
    showPartialFailureWarning(data);
    statusText.textContent = t.statusDone;
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('show');
    statusText.textContent = '';
  } finally {
    genBtn.disabled = false;
    readBtn.disabled = false;
    wave.classList.remove('active');
  }
});
</script>
</body>
</html>
